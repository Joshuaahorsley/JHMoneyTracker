<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#4C6FFF" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Money" />
<title>Money</title>
<style>
:root{
  --bg:#EEF0F4;
  --card:#FFFFFF;
  --ink:#10172A;
  --ink-2:#586079;
  --muted:#9099AC;
  --line:#E7EAF0;
  --line-soft:#EFF1F6;
  --field:#F4F6FA;
  --accent:#4C6FFF;
  --accent-ink:#3A57E8;
  --accent-soft:#EAEEFF;
  --pos:#12B886;
  --pos-soft:#E4F8F0;
  --neg:#F0455E;
  --neg-soft:#FDE9EC;
  --shadow:0 1px 2px rgba(16,23,42,.04),0 8px 24px rgba(16,23,42,.06);
  --shadow-card:0 8px 30px rgba(35,49,120,.18);
  --r:18px;
  --r-sm:12px;
  --r-xs:10px;
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg);
  font-family:var(--sans);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  line-height:1.45;
}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
.shell{max-width:460px;margin:0 auto;padding:20px 16px calc(40px + env(safe-area-inset-bottom));}

/* ---------- hero account card ---------- */
.hero{
  position:relative;
  border-radius:24px;
  padding:20px 20px 22px;
  color:#fff;
  background:linear-gradient(150deg,#5B6BFF 0%,#4C6FFF 42%,#3F8BFF 100%);
  box-shadow:var(--shadow-card);
  overflow:hidden;
  animation:rise .5s cubic-bezier(.2,.7,.2,1) both;
}
.hero::after{
  content:"";position:absolute;right:-60px;top:-70px;width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.22),rgba(255,255,255,0) 70%);
  pointer-events:none;
}
.hero-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:18px}
.month{position:relative;display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:600;letter-spacing:.1px;color:#fff;opacity:.96}
.month select{
  position:absolute;inset:0;opacity:0;width:100%;height:100%;border:0;cursor:pointer;font-size:16px;
}
.month .chev{width:16px;height:16px;opacity:.85}
.hero-tools{display:flex;gap:8px}
.tool{
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:11px;
  background:rgba(255,255,255,.16);color:#fff;border:0;cursor:pointer;transition:background .15s,transform .1s;
}
.tool:hover{background:rgba(255,255,255,.26)}
.tool:active{transform:scale(.94)}
.tool svg{width:18px;height:18px}
.hero-label{font-size:13px;font-weight:500;opacity:.82;margin-bottom:2px}
.hero-amt{font-size:42px;font-weight:700;letter-spacing:-1px;line-height:1.05}
.hero-sub{font-size:13px;opacity:.82;margin-top:5px;min-height:18px}
.hero-meter{height:7px;border-radius:6px;background:rgba(255,255,255,.22);overflow:hidden;margin-top:16px;display:flex}
.hero-meter span{height:100%;display:block;transition:width .4s cubic-bezier(.2,.7,.2,1)}
.hero-foot{display:flex;justify-content:space-between;font-size:12px;opacity:.85;margin-top:9px}

/* ---------- stat tiles ---------- */
.tiles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:14px 0 20px}
.tile{
  background:var(--card);border-radius:var(--r-sm);padding:12px 12px 13px;box-shadow:var(--shadow);
  animation:rise .5s cubic-bezier(.2,.7,.2,1) both;
}
.tile:nth-child(2){animation-delay:.04s}
.tile:nth-child(3){animation-delay:.08s}
.tile.tap{cursor:pointer;transition:transform .1s}
.tile.tap:active{transform:scale(.97)}
.tile-l{font-size:11px;color:var(--ink-2);font-weight:500;display:flex;align-items:center;gap:4px;margin-bottom:6px}
.tile-l .pencil{width:11px;height:11px;color:var(--muted)}
.tile-v{font-size:18px;font-weight:700;letter-spacing:-.4px;color:var(--ink)}
.tile-x{font-size:10.5px;color:var(--muted);margin-top:1px}

/* ---------- section ---------- */
.sec-title{font-size:12px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);margin:0 4px 10px}

/* ---------- category cards ---------- */
.cats{display:flex;flex-direction:column;gap:10px}
.cat{
  background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;
  animation:rise .45s cubic-bezier(.2,.7,.2,1) both;
}
.cat-head{display:flex;align-items:center;gap:13px;padding:14px 16px;cursor:pointer;user-select:none}
.cat-head:active{background:var(--line-soft)}
.cat-ic{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cat-ic svg{width:21px;height:21px}
.cat-mid{flex:1;min-width:0}
.cat-name{font-size:15px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:8px;letter-spacing:-.2px}
.cat-pct{font-size:11px;color:var(--muted);font-weight:600;background:var(--field);padding:1px 7px;border-radius:20px}
.cat-track{height:6px;background:var(--line-soft);border-radius:6px;overflow:hidden;margin-top:7px;max-width:170px}
.cat-fill{height:100%;border-radius:6px;transition:width .4s cubic-bezier(.2,.7,.2,1)}
.cat-amt{font-size:16px;font-weight:700;color:var(--ink);text-align:right;white-space:nowrap;letter-spacing:-.3px}
.cat-chev{color:var(--muted);width:20px;height:20px;flex-shrink:0;transition:transform .22s ease}
.cat.open .cat-chev{transform:rotate(180deg)}
.cat-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .26s ease}
.cat.open .cat-body{grid-template-rows:1fr}
.cat-body-inner{overflow:hidden}
.cat-pad{padding:2px 16px 14px}

/* line items */
.li{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line-soft)}
.li:last-of-type{border-bottom:none}
.li-name{flex:1;font-size:14px;color:var(--ink-2);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-amt{font-size:14px;color:var(--ink);font-weight:600;white-space:nowrap}
.li-act{display:flex;gap:2px;flex-shrink:0}
.li-btn{cursor:pointer;color:var(--muted);border:none;background:none;padding:6px;border-radius:8px;display:flex;transition:background .12s,color .12s}
.li-btn svg{width:16px;height:16px}
.li-btn:hover{background:var(--field);color:var(--ink)}
.li-btn.del:hover{background:var(--neg-soft);color:var(--neg)}

/* edit + add rows */
.edit-row{display:flex;gap:8px;align-items:center;padding:10px 0;flex-wrap:wrap}
.fld{font-size:14px;padding:10px 12px;border:1px solid var(--line);border-radius:11px;background:var(--field);color:var(--ink);outline:none;transition:border-color .15s,background .15s}
.fld:focus{border-color:var(--accent);background:#fff}
.fld.nm{flex:2;min-width:130px}
.fld.am{width:94px}
.btn{font-size:14px;font-weight:600;padding:10px 14px;border:1px solid var(--line);border-radius:11px;background:#fff;color:var(--ink);cursor:pointer;white-space:nowrap;transition:transform .1s,background .15s}
.btn:active{transform:scale(.96)}
.btn:hover{background:var(--field)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent-ink)}
.add-line{font-size:13.5px;font-weight:600;color:var(--accent-ink);cursor:pointer;padding:11px 0 3px;display:inline-flex;align-items:center;gap:6px}
.add-line svg{width:16px;height:16px}
.add-line:active{opacity:.6}

/* everyday block */
.bgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin:8px 0 4px}
.bcell{background:var(--field);border-radius:var(--r-xs);padding:11px 12px;text-align:center}
.bcell-l{font-size:11px;color:var(--ink-2);margin-bottom:4px;font-weight:500}
.bcell-v{font-size:16px;font-weight:700;letter-spacing:-.3px}
.seg-head{font-size:12px;color:var(--ink-2);margin:14px 0 6px;display:flex;justify-content:space-between;font-weight:500}
.subbar{display:flex;height:8px;border-radius:6px;overflow:hidden;background:var(--line-soft)}
.subbar span{height:100%;transition:width .4s cubic-bezier(.2,.7,.2,1)}
.spend-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:14px}
.log{margin-top:6px;display:flex;flex-direction:column}
.log-it{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line-soft)}
.log-it:last-child{border-bottom:none}
.log-tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--accent-soft);color:var(--accent-ink);white-space:nowrap}
.log-desc{flex:1;font-size:14px;color:var(--ink);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.log-amt{font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap}
.log-del{cursor:pointer;color:var(--muted);border:none;background:none;padding:5px;border-radius:8px;display:flex}
.log-del svg{width:15px;height:15px}
.log-del:hover{background:var(--neg-soft);color:var(--neg)}
.empty{font-size:13.5px;color:var(--muted);padding:18px 0;text-align:center}
.note{font-size:12.5px;color:var(--muted);margin-top:14px;line-height:1.55;padding:12px 14px;background:var(--field);border-radius:12px}

/* in-app dialog (works in standalone/home-screen mode where prompt/confirm don't) */
.modal-bg{position:fixed;inset:0;background:rgba(16,23,42,.45);display:flex;align-items:center;justify-content:center;padding:24px;z-index:80;opacity:0;animation:fade .15s forwards}
.modal{background:var(--card);border-radius:20px;box-shadow:0 24px 64px rgba(16,23,42,.32);width:100%;max-width:340px;padding:22px 22px 18px;animation:rise .26s cubic-bezier(.2,.7,.2,1) both}
.modal h4{margin:0 0 7px;font-size:17px;font-weight:700;letter-spacing:-.3px;color:var(--ink)}
.modal p{margin:0 0 16px;font-size:14px;color:var(--ink-2);line-height:1.5}
.modal .fld{width:100%;font-size:16px;margin-bottom:18px}
.modal.wide{max-width:380px}
.modal .ta{height:160px;resize:none;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11.5px;line-height:1.4;white-space:pre;overflow:auto}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}
.btn.danger{background:var(--neg);border-color:var(--neg);color:#fff}
.btn.danger:hover{background:#d83a52}
@keyframes fade{to{opacity:1}}

@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>
<body>
<div class="shell">
  <input type="file" id="import-file" accept="application/json,.json" style="display:none" onchange="handleImportFile(this)" />

  <!-- HERO -->
  <div class="hero">
    <div class="hero-top">
      <div class="month">
        <span id="month-name">This month</span>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        <select id="month-pick" onchange="switchMonth()" aria-label="Choose month"></select>
      </div>
      <div class="hero-tools">
        <button class="tool" onclick="exportData()" title="Export a backup" aria-label="Export a backup">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7.5 10.5 12 15l4.5-4.5"/><path d="M5 20h14"/></svg>
        </button>
        <button class="tool" onclick="importData()" title="Import a backup" aria-label="Import a backup">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3"/><path d="M7.5 7.5 12 3l4.5 4.5"/><path d="M5 20h14"/></svg>
        </button>
        <button class="tool" onclick="deleteCurrentMonth()" title="Delete this month" aria-label="Delete this month">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/><path d="M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13"/></svg>
        </button>
        <button class="tool" onclick="resetAll()" title="Reset to defaults" aria-label="Reset to defaults">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 4v5h-5"/></svg>
        </button>
      </div>
    </div>
    <div class="hero-label">Free to spend</div>
    <div class="hero-amt num" id="hero-left">£0</div>
    <div class="hero-sub" id="hero-sub"></div>
    <div class="hero-meter" id="hero-meter"></div>
    <div class="hero-foot"><span id="hero-foot-l"></span><span id="hero-foot-r"></span></div>
  </div>

  <!-- STAT TILES -->
  <div class="tiles">
    <div class="tile tap" onclick="editSalary()">
      <div class="tile-l">Salary
        <svg class="pencil" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 16.5 14.5 6l3.5 3.5L7.5 20H4z"/><path d="M13 7.5l3.5 3.5"/></svg>
      </div>
      <div class="tile-v num" id="tile-salary">£0</div>
      <div class="tile-x">after tax</div>
    </div>
    <div class="tile">
      <div class="tile-l">Committed</div>
      <div class="tile-v num" id="tile-fixed">£0</div>
      <div class="tile-x">bills, pots, ISA</div>
    </div>
    <div class="tile">
      <div class="tile-l">Everyday</div>
      <div class="tile-v num" id="tile-budget">£0</div>
      <div class="tile-x">monthly budget</div>
    </div>
  </div>

  <div class="sec-title">Where it goes</div>
  <div class="cats" id="cats"></div>
</div>

<script>
const DEFAULT_CONFIG = {
  salary: 2800,
  blocks: [
    {id:'joint', name:'Joint account', icon:'home', color:'#4C6FFF', items:[
      {n:'Mortgage (your half)',a:510},{n:'Utilities, water, council tax (your half)',a:165},
      {n:'Home insurance (your half)',a:14},{n:'Broadband, Ring (your half)',a:44},{n:'Buffer within joint',a:67}]},
    {id:'commit', name:'Commitments', icon:'card', color:'#FF6B6B', items:[
      {n:'Car loan',a:430},{n:'EE phones (3 lines)',a:92}]},
    {id:'subs', name:'Subscriptions', icon:'tv', color:'#F5A524', items:[
      {n:'Claude',a:18},{n:'YouTube Premium',a:12.99},{n:'Amazon Prime',a:8.99},{n:'Disney+',a:7.99}]},
    {id:'pots', name:'Savings pots', icon:'wallet', color:'#7C5CFC', items:[
      {n:'Fuel',a:120},{n:'Car insurance',a:80},{n:'Maintenance (house/car/emergency)',a:80},
      {n:'Holidays',a:100},{n:'Christmas',a:50},{n:'Road tax',a:30},{n:'Clothes',a:30},
      {n:'Car service',a:20},{n:'Haircut',a:15},{n:'Tia birthday',a:10},{n:'Henry birthday',a:10},
      {n:'Valentine\u2019s',a:5},{n:'Anniversary',a:5},{n:'Gifts (misc)',a:5},{n:'MOT',a:5},
      {n:'Mum birthday',a:4},{n:'Other birthdays & occasions',a:14.5},{n:'Tia Mother\u2019s Day',a:3}]},
    {id:'isa', name:'ISA investing', icon:'trend', color:'#12B886', accent:'success', items:[
      {n:'FTSE All-World index fund',a:150}]},
  ]
};

const spendCategories = ['Groceries','Eating out','Coffee','Fuel top-up','Treats/fun','Baby','Other'];
const segColors = ['#4C6FFF','#12B886','#F5A524','#E879A6','#7C5CFC','#FB7C4C','#9099AC'];

/* inline icon set (stroke, currentColor) */
const ICONS = {
  home:'<path d="M3 9.6 12 3l9 6.6V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/><path d="M9.2 21v-6h5.6v6"/>',
  card:'<rect x="2.5" y="5" width="19" height="14" rx="2.6"/><path d="M2.5 9.6h19"/>',
  tv:'<rect x="2.5" y="5.5" width="19" height="12" rx="2.2"/><path d="M8 21h8"/><path d="M12 17.5V21"/>',
  wallet:'<path d="M19 7V5.6A1.6 1.6 0 0 0 17.4 4H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h13a1 1 0 0 0 1-1v-2.2"/><path d="M21 9.8h-4.6a2.1 2.1 0 0 0 0 4.2H21a1 1 0 0 0 1-1v-2.2a1 1 0 0 0-1-1z"/>',
  trend:'<path d="M3 17l6-6 4 4 7-7"/><path d="M14 8h5v5"/>',
  bag:'<path d="M6 8h12l-1 11.2a1 1 0 0 1-1 .8H8a1 1 0 0 1-1-.8z"/><path d="M9 8V6.2a3 3 0 0 1 6 0V8"/>',
  plus:'<path d="M12 5v14"/><path d="M5 12h14"/>',
  pencil:'<path d="M4 16.5 14.5 6l3.5 3.5L7.5 20H4z"/><path d="M13 7.5l3.5 3.5"/>',
  trash:'<path d="M4 7h16"/><path d="M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/><path d="M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13"/>',
  x:'<path d="M6 6l12 12"/><path d="M18 6 6 18"/>',
  chev:'<path d="M6 9l6 6 6-6"/>',
  download:'<path d="M12 3v12"/><path d="M7.5 10.5 12 15l4.5-4.5"/><path d="M5 20h14"/>',
  upload:'<path d="M12 15V3"/><path d="M7.5 7.5 12 3l4.5 4.5"/><path d="M5 20h14"/>'
};
function svg(name,cls){return `<svg class="${cls||''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||''}</svg>`;}

let CONFIG = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
let LOG = [];
let openState = {everyday:true};
let editing = null;

function defaultMonthKey(){const d=new Date();return d.toLocaleString('en-GB',{month:'long'})+' '+d.getFullYear();}
const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
function parseMonthKey(s){const p=String(s).split(' ');const mi=MONTH_NAMES.indexOf(p[0]);const y=parseInt(p[1],10);if(mi<0||isNaN(y))return null;return new Date(y,mi,1);}
function fmtMonthKey(d){return d.toLocaleString('en-GB',{month:'long'})+' '+d.getFullYear();}
function curMonth(){const s=document.getElementById('month-pick');return s.value&&s.value!=='__new'?s.value:defaultMonthKey();}
function gbp(n){return '£'+Number(n).toLocaleString('en-GB',{maximumFractionDigits:n%1===0?0:2});}

/* ---- storage: window.storage (Claude, account-synced) with localStorage fallback ----
   A synchronous in-memory cache (STORE) backs the rest of the app, so the UI logic
   stays simple; writes are persisted asynchronously underneath. ---- */
const HAS_WS = (typeof window!=='undefined' && window.storage && typeof window.storage.get==='function');
const STORE = {};

async function persistGet(k){
  if(HAS_WS){try{const r=await window.storage.get(k);return (r&&r.value!=null)?JSON.parse(r.value):null;}catch(e){return null;}}
  try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}
}
async function persistSet(k,v){
  const s=JSON.stringify(v);
  if(HAS_WS){try{await window.storage.set(k,s);return;}catch(e){}}
  try{localStorage.setItem(k,s);}catch(e){}
}
async function persistDel(k){
  if(HAS_WS){try{await window.storage.delete(k);return;}catch(e){}}
  try{localStorage.removeItem(k);}catch(e){}
}

function sGet(k){return (k in STORE)?STORE[k]:null;}
function sSet(k,v){STORE[k]=v;persistSet(k,v);}
function sDel(k){delete STORE[k];persistDel(k);}

async function bootStore(){
  const cfg=await persistGet('mt:config:v1');if(cfg)STORE['mt:config:v1']=cfg;
  let months=await persistGet('mt:months');
  if(!months||!months.length)months=[defaultMonthKey()];
  STORE['mt:months']=months;
  for(const m of months){STORE['mt:spend:'+m]=(await persistGet('mt:spend:'+m))||[];}
}

function loadConfig(){const c=sGet('mt:config:v1');if(c)CONFIG=c;}
function saveConfig(){sSet('mt:config:v1',CONFIG);}
function loadLog(m){LOG=sGet('mt:spend:'+m)||[];}
function saveLog(m){sSet('mt:spend:'+m,LOG);}
function loadMonths(){return sGet('mt:months')||[defaultMonthKey()];}
function saveMonths(l){sSet('mt:months',l);}

function init(){
  loadConfig();
  let months=loadMonths();
  const dk=defaultMonthKey();
  if(!months.includes(dk)){months.unshift(dk);saveMonths(months);}
  const sel=document.getElementById('month-pick');
  sel.innerHTML=months.map(m=>`<option value="${m}">${m}</option>`).join('')+`<option value="__new">+ New month</option>`;
  sel.value=dk;
  loadLog(dk);
  render();
}

function switchMonth(){
  const sel=document.getElementById('month-pick');
  if(sel.value==='__new'){
    let months=loadMonths();
    let latest=null;
    months.forEach(m=>{const dt=parseMonthKey(m);if(dt&&(!latest||dt>latest))latest=dt;});
    if(!latest){const n=new Date();latest=new Date(n.getFullYear(),n.getMonth(),1);}
    let cand,i=1;
    do{const dd=new Date(latest.getFullYear(),latest.getMonth()+i,1);cand=fmtMonthKey(dd);i++;}while(months.includes(cand)&&i<48);
    months.unshift(cand);saveMonths(months);
    sel.innerHTML=months.map(m=>`<option value="${m}">${m}</option>`).join('')+`<option value="__new">+ New month</option>`;
    sel.value=cand;
  }
  loadLog(sel.value);render();
}

async function resetAll(){
  const ok=await uiConfirm('Reset everything','This clears every month and all logged spending and restores the default categories \u2014 a completely fresh start. It can\u2019t be undone.','Reset',true);
  if(!ok)return;
  loadMonths().forEach(m=>sDel('mt:spend:'+m));
  CONFIG=JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  saveConfig();
  const dk=defaultMonthKey();
  saveMonths([dk]);
  LOG=[];
  const sel=document.getElementById('month-pick');
  sel.innerHTML=`<option value="${dk}">${dk}</option><option value="__new">+ New month</option>`;
  sel.value=dk;
  loadLog(dk);
  render();
}

async function deleteCurrentMonth(){
  let months=loadMonths();
  const m=curMonth();
  if(months.length<=1){await uiAlert('Can\u2019t delete this','It\u2019s your only month. Add another first if you want to remove this one.');return;}
  const ok=await uiConfirm('Delete month','Remove \u201c'+m+'\u201d and its spending log? Your categories and other months stay.','Delete',true);
  if(!ok)return;
  months=months.filter(x=>x!==m);
  saveMonths(months);
  sDel('mt:spend:'+m);
  const sel=document.getElementById('month-pick');
  sel.innerHTML=months.map(x=>`<option value="${x}">${x}</option>`).join('')+`<option value="__new">+ New month</option>`;
  sel.value=months[0];
  loadLog(months[0]);
  render();
}

function blockTotal(b){return b.items.reduce((s,i)=>s+Number(i.a||0),0);}
function fixedTotal(){return CONFIG.blocks.reduce((s,b)=>s+blockTotal(b),0);}
function everydayBudget(){return CONFIG.salary-fixedTotal();}
function totalSpent(){return LOG.reduce((s,l)=>s+l.amt,0);}
function spentByCat(){const o={};spendCategories.forEach(c=>o[c]=0);LOG.forEach(l=>o[l.cat]=(o[l.cat]||0)+l.amt);return o;}

let modalKey=null;
function closeModal(){const m=document.querySelector('.modal-bg');if(m)m.remove();if(modalKey){document.removeEventListener('keydown',modalKey);modalKey=null;}}
function uiConfirm(title,msg,okLabel,danger){
  return new Promise(res=>{
    const bg=document.createElement('div');bg.className='modal-bg';
    bg.innerHTML=`<div class="modal"><h4>${escapeHtml(title)}</h4>${msg?`<p>${escapeHtml(msg)}</p>`:''}<div class="modal-actions"><button class="btn" data-act="cancel">Cancel</button><button class="btn primary${danger?' danger':''}" data-act="ok">${escapeHtml(okLabel||'OK')}</button></div></div>`;
    document.body.appendChild(bg);
    const fin=v=>{closeModal();res(v);};
    bg.addEventListener('click',e=>{if(e.target===bg)fin(false);});
    bg.querySelector('[data-act=cancel]').onclick=()=>fin(false);
    bg.querySelector('[data-act=ok]').onclick=()=>fin(true);
    modalKey=e=>{if(e.key==='Escape')fin(false);else if(e.key==='Enter')fin(true);};
    document.addEventListener('keydown',modalKey);
  });
}
function uiPrompt(title,msg,value,okLabel){
  return new Promise(res=>{
    const bg=document.createElement('div');bg.className='modal-bg';
    bg.innerHTML=`<div class="modal"><h4>${escapeHtml(title)}</h4>${msg?`<p>${escapeHtml(msg)}</p>`:''}<input class="fld num" id="modal-inp" type="number" inputmode="decimal" step="0.01" value="${value}" /><div class="modal-actions"><button class="btn" data-act="cancel">Cancel</button><button class="btn primary" data-act="ok">${escapeHtml(okLabel||'Save')}</button></div></div>`;
    document.body.appendChild(bg);
    const inp=bg.querySelector('#modal-inp');
    setTimeout(()=>{inp.focus();inp.select();},30);
    const fin=v=>{closeModal();res(v);};
    bg.addEventListener('click',e=>{if(e.target===bg)fin(null);});
    bg.querySelector('[data-act=cancel]').onclick=()=>fin(null);
    bg.querySelector('[data-act=ok]').onclick=()=>fin(inp.value);
    modalKey=e=>{if(e.key==='Escape')fin(null);else if(e.key==='Enter'){e.preventDefault();fin(inp.value);}};
    document.addEventListener('keydown',modalKey);
  });
}
function uiAlert(title,msg){
  return new Promise(res=>{
    const bg=document.createElement('div');bg.className='modal-bg';
    bg.innerHTML=`<div class="modal"><h4>${escapeHtml(title)}</h4>${msg?`<p>${escapeHtml(msg)}</p>`:''}<div class="modal-actions"><button class="btn primary" data-act="ok">OK</button></div></div>`;
    document.body.appendChild(bg);
    const fin=()=>{closeModal();res();};
    bg.addEventListener('click',e=>{if(e.target===bg)fin();});
    bg.querySelector('[data-act=ok]').onclick=fin;
    modalKey=e=>{if(e.key==='Escape'||e.key==='Enter')fin();};
    document.addEventListener('keydown',modalKey);
  });
}

async function editSalary(){
  const v=await uiPrompt('Net monthly salary','After tax, per month.',CONFIG.salary,'Save');
  if(v===null)return;const n=parseFloat(v);if(!isNaN(n)&&n>0){CONFIG.salary=n;saveConfig();render();}
}

function render(){
  document.getElementById('month-name').textContent=curMonth();
  const sal=CONFIG.salary,fixed=fixedTotal(),budget=everydayBudget(),spent=totalSpent(),left=budget-spent;

  /* hero */
  const heroLeft=document.getElementById('hero-left');
  heroLeft.textContent=gbp(Math.round(left));
  heroLeft.style.color=left<0?'#FFD7DE':'#fff';
  document.getElementById('hero-sub').textContent=spent>0
    ? `${gbp(Math.round(spent))} spent of ${gbp(Math.round(budget))} everyday budget`
    : `Your everyday budget for ${curMonth()}`;
  const usedPct=budget>0?Math.max(0,Math.min(100,spent/budget*100)):0;
  document.getElementById('hero-meter').innerHTML=
    `<span style="width:${usedPct}%;background:${left<0?'#FFB3BE':'#fff'}"></span>`;
  document.getElementById('hero-foot-l').textContent=`${budget>0?Math.round(spent/budget*100):0}% of everyday used`;
  document.getElementById('hero-foot-r').textContent=`${sal>0?Math.round(fixed/sal*100):0}% committed`;

  /* tiles */
  document.getElementById('tile-salary').textContent=gbp(sal);
  document.getElementById('tile-fixed').textContent=gbp(fixed);
  document.getElementById('tile-budget').textContent=gbp(Math.round(budget));

  /* categories */
  let html='';
  CONFIG.blocks.forEach(b=>{
    const tot=blockTotal(b),pct=Math.round(tot/sal*100);
    const isSuccess=b.accent==='success';
    const icStyle=isSuccess
      ? `background:var(--pos-soft);color:var(--pos)`
      : `background:${hexA(b.color,.12)};color:${b.color}`;
    const isOpen=openState[b.id];
    html+=`<div class="cat ${isOpen?'open':''}" id="cat-${b.id}">
      <div class="cat-head" onclick="toggle('${b.id}')">
        <div class="cat-ic" style="${icStyle}">${svg(b.icon)}</div>
        <div class="cat-mid">
          <div class="cat-name">${b.name}<span class="cat-pct num">${pct}%</span></div>
          <div class="cat-track"><div class="cat-fill" style="width:${Math.min(100,tot/sal*100)}%;background:${b.color}"></div></div>
        </div>
        <div class="cat-amt num">${gbp(tot)}</div>
        ${svg('chev','cat-chev')}
      </div>
      <div class="cat-body"><div class="cat-body-inner"><div class="cat-pad">
        ${b.items.map((it,idx)=>renderItem(b.id,idx,it)).join('')}
        ${editing&&editing.block===b.id&&editing.idx===-1?renderEditForm(b.id,-1,{n:'',a:''}):
          `<div class="add-line" onclick="startAdd('${b.id}')">${svg('plus')} Add item</div>`}
      </div></div></div>
    </div>`;
  });

  /* everyday */
  const spentCat=spentByCat();
  let segHtml=spendCategories.map((c,i)=>{const v=spentCat[c]||0;return v>0?`<span style="width:${budget>0?v/budget*100:0}%;background:${segColors[i]}"></span>`:'';}).join('');
  if(left>0&&budget>0)segHtml+=`<span style="width:${left/budget*100}%;background:transparent"></span>`;
  const evOpen=openState.everyday;
  html+=`<div class="cat ${evOpen?'open':''}" id="cat-everyday">
    <div class="cat-head" onclick="toggle('everyday')">
      <div class="cat-ic" style="background:var(--field);color:var(--ink-2)">${svg('bag')}</div>
      <div class="cat-mid">
        <div class="cat-name">Everyday living<span class="cat-pct num">${Math.round(budget/sal*100)}%</span></div>
        <div class="cat-track"><div class="cat-fill" style="width:${Math.min(100,budget/sal*100)}%;background:#9099AC"></div></div>
      </div>
      <div class="cat-amt num">${gbp(Math.round(budget))}</div>
      ${svg('chev','cat-chev')}
    </div>
    <div class="cat-body"><div class="cat-body-inner"><div class="cat-pad">
      <div class="bgrid">
        <div class="bcell"><div class="bcell-l">Budget</div><div class="bcell-v num">${gbp(Math.round(budget))}</div></div>
        <div class="bcell"><div class="bcell-l">Spent</div><div class="bcell-v num">${gbp(Math.round(spent))}</div></div>
        <div class="bcell"><div class="bcell-l">Left</div><div class="bcell-v num" style="color:${left<0?'var(--neg)':'var(--pos)'}">${gbp(Math.round(left))}</div></div>
      </div>
      <div class="seg-head"><span>How it's split</span><span>${budget>0?Math.round(spent/budget*100):0}% used</span></div>
      <div class="subbar">${segHtml}</div>
      <div class="spend-row">
        <input class="fld nm" id="sp-desc" placeholder="What did you spend on?" />
        <input class="fld am" id="sp-amt" type="number" inputmode="decimal" placeholder="£" step="0.01" />
        <select class="fld" id="sp-cat" style="flex:1;min-width:96px">${spendCategories.map(c=>`<option>${c}</option>`).join('')}</select>
        <button class="btn primary" onclick="addSpend()">Add</button>
      </div>
      <div class="log" id="log">
        ${LOG.length===0?'<div class="empty">Nothing logged yet. Add your first spend above.</div>':
          LOG.slice().reverse().map((l,ri)=>{const ridx=LOG.length-1-ri;return `<div class="log-it"><span class="log-tag">${l.cat}</span><span class="log-desc">${escapeHtml(l.desc)||'\u2014'}</span><span class="log-amt num">£${l.amt.toFixed(2)}</span><button class="log-del" onclick="delSpend(${ridx})" aria-label="Delete">${svg('x')}</button></div>`;}).join('')}
      </div>
      <div class="note">Log as you go. Eating out, coffee and treats are where the spare tends to slip — it's all yours to enjoy, this just keeps it a choice.</div>
    </div></div></div>
  </div>`;

  document.getElementById('cats').innerHTML=html;
}

function renderItem(blockId,idx,it){
  if(editing&&editing.block===blockId&&editing.idx===idx) return renderEditForm(blockId,idx,it);
  return `<div class="li">
    <span class="li-name">${escapeHtml(it.n)}</span>
    <span class="li-amt num">${gbp(it.a)}</span>
    <span class="li-act">
      <button class="li-btn" onclick="startEdit('${blockId}',${idx})" aria-label="Edit">${svg('pencil')}</button>
      <button class="li-btn del" onclick="delItem('${blockId}',${idx})" aria-label="Delete">${svg('trash')}</button>
    </span>
  </div>`;
}

function renderEditForm(blockId,idx,it){
  return `<div class="edit-row">
    <input class="fld nm" id="ed-nm" value="${String(it.n).replace(/"/g,'&quot;')}" placeholder="Name" />
    <input class="fld am" id="ed-am" type="number" inputmode="decimal" step="0.01" value="${it.a}" placeholder="£" />
    <button class="btn primary" onclick="commitEdit('${blockId}',${idx})">Save</button>
    <button class="btn" onclick="cancelEdit()">Cancel</button>
  </div>`;
}

function escapeHtml(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function hexA(hex,a){const h=hex.replace('#','');const r=parseInt(h.substring(0,2),16),g=parseInt(h.substring(2,4),16),b=parseInt(h.substring(4,6),16);return `rgba(${r},${g},${b},${a})`;}

function toggle(id){openState[id]=!openState[id];render();}
function startEdit(b,i){editing={block:b,idx:i};render();setTimeout(()=>document.getElementById('ed-nm')?.focus(),0);}
function startAdd(b){editing={block:b,idx:-1};openState[b]=true;render();setTimeout(()=>document.getElementById('ed-nm')?.focus(),0);}
function cancelEdit(){editing=null;render();}

function commitEdit(blockId,idx){
  const nm=document.getElementById('ed-nm').value.trim();
  const am=parseFloat(document.getElementById('ed-am').value);
  if(!nm||isNaN(am)||am<0){return;}
  const b=CONFIG.blocks.find(x=>x.id===blockId);
  if(idx===-1)b.items.push({n:nm,a:am});
  else b.items[idx]={n:nm,a:am};
  editing=null;saveConfig();render();
}
async function delItem(blockId,idx){
  const b=CONFIG.blocks.find(x=>x.id===blockId);
  const ok=await uiConfirm('Delete item','Remove \u201c'+b.items[idx].n+'\u201d?','Delete',true);
  if(!ok)return;
  b.items.splice(idx,1);saveConfig();render();
}

function addSpend(){
  const desc=document.getElementById('sp-desc').value.trim();
  const amt=parseFloat(document.getElementById('sp-amt').value);
  const cat=document.getElementById('sp-cat').value;
  if(isNaN(amt)||amt<=0)return;
  LOG.push({desc,amt,cat,ts:Date.now()});
  saveLog(curMonth());
  render();
  setTimeout(()=>document.getElementById('sp-desc')?.focus(),0);
}
function delSpend(i){LOG.splice(i,1);saveLog(curMonth());render();}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(e.target.id==='sp-desc'||e.target.id==='sp-amt'){addSpend();}
    if(e.target.id==='ed-nm'||e.target.id==='ed-am'){const f=e.target.closest('.edit-row');if(f)f.querySelector('.primary').click();}
  }
});

function exportData(){
  saveLog(curMonth());
  const months=loadMonths();
  const data={app:'Joshua Money Tracker',version:1,exportedAt:new Date().toISOString(),
    config:CONFIG,months:months,spend:{}};
  months.forEach(m=>{data.spend[m]=sGet('mt:spend:'+m)||[];});
  const json=JSON.stringify(data,null,2);
  try{
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='money-backup-'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},120);
  }catch(e){}
  showExport(json);
}
function showExport(json){
  const bg=document.createElement('div');bg.className='modal-bg';
  bg.innerHTML=`<div class="modal wide"><h4>Your data</h4><p>If a file downloaded, upload that to me. Otherwise tap Copy and paste it into a chat \u2014 either gives me everything to analyse.</p><textarea class="fld ta" readonly id="exp-ta"></textarea><div class="modal-actions"><button class="btn" data-act="close">Close</button><button class="btn primary" data-act="copy">Copy</button></div></div>`;
  document.body.appendChild(bg);
  const ta=bg.querySelector('#exp-ta');ta.value=json;
  const close=()=>{closeModal();};
  bg.addEventListener('click',e=>{if(e.target===bg)close();});
  bg.querySelector('[data-act=close]').onclick=close;
  bg.querySelector('[data-act=copy]').onclick=()=>{
    ta.focus();ta.select();
    let done=false;
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(json).then(()=>{},()=>{});done=true;}
    try{document.execCommand('copy');done=true;}catch(e){}
    const b=bg.querySelector('[data-act=copy]');b.textContent=done?'Copied':'Select & copy';
  };
  modalKey=e=>{if(e.key==='Escape')close();};
  document.addEventListener('keydown',modalKey);
}
function importData(){document.getElementById('import-file').click();}
function handleImportFile(input){
  const file=input.files&&input.files[0];
  if(!file){return;}
  const reader=new FileReader();
  reader.onload=async ()=>{
    try{
      const data=JSON.parse(reader.result);
      if(!data||!data.config||!Array.isArray(data.config.blocks)){throw new Error('bad');}
      const ok=await uiConfirm('Import backup','This replaces the data currently stored with the backup.','Import',true);
      if(!ok){input.value='';return;}
      await persistSet('mt:config:v1',data.config);
      const months=(Array.isArray(data.months)&&data.months.length)?data.months:[defaultMonthKey()];
      await persistSet('mt:months',months);
      STORE['mt:config:v1']=data.config;STORE['mt:months']=months;
      if(data.spend){for(const m of Object.keys(data.spend)){await persistSet('mt:spend:'+m,data.spend[m]||[]);STORE['mt:spend:'+m]=data.spend[m]||[];}}
      CONFIG=data.config;
      const sel=document.getElementById('month-pick');
      sel.innerHTML=months.map(x=>`<option value="${x}">${x}</option>`).join('')+`<option value="__new">+ New month</option>`;
      sel.value=months[0];loadLog(months[0]);render();
      await uiAlert('Imported','Your backup is loaded.');
    }catch(e){await uiAlert('Couldn\u2019t import','That file doesn\u2019t look like a Money backup. Nothing was changed.');}
    input.value='';
  };
  reader.readAsText(file);
}
